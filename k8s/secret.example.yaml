# Reference only — DO NOT commit real values here.
# The actual Secret is created/updated by CI from masked GitLab CI/CD variables:
#   DATABASE_URL, OPENAI_API_KEY
# (Settings → CI/CD → Variables on this project), via:
#   kubectl create secret generic business-card-agent-secrets \
#     --from-literal=DATABASE_URL="$DATABASE_URL" \
#     --from-literal=OPENAI_API_KEY="$OPENAI_API_KEY" \
#     -n agent-test --dry-run=client -o yaml | kubectl apply -f -
#
# DATABASE_URL points at a dedicated database + least-privilege role on the
# existing gitlab-postgres RDS instance (business_card_agent / business_card_agent_app),
# isolated from gitlabhq_production. Schema: see schema.sql.
# OPENAI_API_KEY is reused from eaip-test/ai-runtime-service-secrets.
apiVersion: v1
kind: Secret
metadata:
  name: business-card-agent-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@host:5432/business_card_agent"
  OPENAI_API_KEY: "replace-me"
